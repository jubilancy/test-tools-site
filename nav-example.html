<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navigation Example</title>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --bg: #ecf0f1;
      --text: #2c3e50;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .site-nav {
      background: var(--primary);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 1rem;
      gap: 2rem;
    }

    .nav-brand {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-brand:hover {
      color: var(--accent);
    }

    .nav-list {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      flex-wrap: wrap;
      flex: 1;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--accent);
    }

    .nav-folder {
      position: relative;
    }

    .nav-folder > .nav-link::after {
      content: " ▼";
      font-size: 0.75rem;
    }

    .nav-submenu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: var(--primary);
      border-top: 2px solid var(--accent);
      flex-direction: column;
      min-width: 200px;
      border-radius: 0 0 4px 4px;
    }

    .nav-folder:hover .nav-submenu {
      display: flex;
    }

    .nav-submenu .nav-link {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-submenu .nav-link:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .content {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">My Site</a>
      <ul class="nav-list" id="nav-list">
        <!-- Populated by JavaScript -->
      </ul>
    </div>
  </nav>

  <main class="content">
    <h1>Navigation Auto-Generated from Folder Structure</h1>
    <p>The navigation above is built from <code>nav.json</code>, which is auto-generated by GitHub Actions.</p>
    <p>Add new folders/files to <code>src/</code>, push to GitHub, and the nav updates automatically.</p>
  </main>

  <script>
    /**
     * Load nav.json and render the navigation
     */
    async function loadNav() {
      try {
        const response = await fetch("/nav.json");
        const navItems = await response.json();
        const navList = document.getElementById("nav-list");

        function renderNav(items) {
          return items.map((item) => {
            if (item.type === "folder") {
              return `
                <li class="nav-folder">
                  <a href="#" class="nav-link">${item.name}</a>
                  <ul class="nav-submenu">
                    ${renderNav(item.children).join("")}
                  </ul>
                </li>
              `;
            } else {
              return `
                <li>
                  <a href="${item.url}" class="nav-link">${item.name}</a>
                </li>
              `;
            }
          });
        }

        navList.innerHTML = renderNav(navItems).join("");
      } catch (error) {
        console.error("Failed to load navigation:", error);
      }
    }

    loadNav();
  </script>
</body>
</html>
