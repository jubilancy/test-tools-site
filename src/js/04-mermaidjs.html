<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid.js - Diagram Editor</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1100px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .editor-section h3, .preview-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            height: 400px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .preview {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
            width: 100%;
            margin-top: 15px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .templates {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .template-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #333;
            font-weight: 500;
            transition: all 0.2s;
        }
        .template-btn:hover {
            background: #e0e0e0;
            border-color: #667eea;
            transform: translateY(-1px);
        }
        .error {
            color: #d32f2f;
            padding: 12px;
            background: #ffebee;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
        }
        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 Mermaid.js</h1>
        <p class="subtitle">Live diagram editor - create flowcharts, sequence diagrams, and more with text</p>
        
        <div class="templates">
            <button class="template-btn" onclick="loadTemplate('flowchart')">Flowchart</button>
            <button class="template-btn" onclick="loadTemplate('sequence')">Sequence</button>
            <button class="template-btn" onclick="loadTemplate('gantt')">Gantt Chart</button>
            <button class="template-btn" onclick="loadTemplate('graph')">Graph</button>
        </div>
        
        <div class="main-grid">
            <div class="editor-section">
                <h3>Diagram Code</h3>
                <textarea id="diagramInput" placeholder="Enter Mermaid diagram syntax...">graph TD
    A[Start] --> B{Is it working?}
    B -->|Yes| C[Great!]
    B -->|No| D[Debug]
    D --> B</textarea>
                <button onclick="renderDiagram()">Render Diagram</button>
                <div id="error"></div>
            </div>
            
            <div class="preview-section">
                <h3>Preview</h3>
                <div class="preview" id="preview">
                    <div style="color: #999; text-align: center;">Diagram will appear here</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        function renderDiagram() {
            const code = document.getElementById('diagramInput').value;
            const preview = document.getElementById('preview');
            const errorDiv = document.getElementById('error');
            
            errorDiv.innerHTML = '';

            if (!code.trim()) {
                errorDiv.innerHTML = '<div class="error">Please enter diagram code</div>';
                return;
            }

            try {
                preview.innerHTML = `<div class="mermaid">${code}</div>`;
                mermaid.contentLoaded();
            } catch (e) {
                errorDiv.innerHTML = `<div class="error">❌ Error: ${e.message}</div>`;
                preview.innerHTML = '<div style="color: #999; text-align: center;">Invalid diagram syntax</div>';
            }
        }

        const templates = {
            flowchart: `graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Process A]
    B -->|No| D[Process B]
    C --> E[End]
    D --> E`,
            sequence: `sequenceDiagram
    participant User
    participant Server
    User->>Server: Request Data
    Server->>Server: Process
    Server-->>User: Return Data`,
            gantt: `gantt
    title Project Timeline
    dateFormat YYYY-MM-DD
    section Tasks
    Task A :a1, 2024-01-01, 30d
    Task B :a2, after a1, 20d
    Task C :a3, after a2, 15d`,
            graph: `graph LR
    A[HTML] --> D{Browser}
    B[CSS] --> D
    C[JavaScript] --> D
    D --> E[Rendered Page]`
        };

        function loadTemplate(type) {
            document.getElementById('diagramInput').value = templates[type];
            setTimeout(renderDiagram, 100);
        }

        // Initial render
        renderDiagram();
    </script>
</body>
</html>
