<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunr.js - Full-Text Search</title>
    <script src="https://cdn.jsdelivr.net/npm/lunr@2.3.9/lunr.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .results {
            margin-top: 30px;
        }
        .result-item {
            padding: 16px;
            background: #f9f9f9;
            border-left: 4px solid #f5576c;
            margin-bottom: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .result-item:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }
        .result-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .result-snippet {
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }
        .result-score {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        .highlight {
            background: #ffeb3b;
            padding: 2px 4px;
            border-radius: 2px;
        }
        .no-results {
            color: #999;
            text-align: center;
            padding: 40px 20px;
        }
        .docs-note {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Lunr.js</h1>
        <p class="subtitle">Full-text search engine - search through documents instantly in the browser</p>
        
        <div class="docs-note">
            💡 Pre-loaded with sample documents. Try searching for: "JavaScript", "browser", or "React"
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search documents..." />
            <button onclick="performSearch()">Search</button>
        </div>
        
        <div class="results" id="results"></div>
    </div>

    <script>
        // Sample documents
        const documents = [
            {
                id: '1',
                title: 'Getting Started with JavaScript',
                content: 'JavaScript is a versatile programming language that runs in the browser. It powers interactive web experiences.'
            },
            {
                id: '2',
                title: 'React Framework Guide',
                content: 'React is a JavaScript library for building user interfaces with reusable components. Learn React fundamentals.'
            },
            {
                id: '3',
                title: 'Web Performance Tips',
                content: 'Optimize your browser performance by reducing JavaScript bundle size and using lazy loading techniques.'
            },
            {
                id: '4',
                title: 'CSS Styling Best Practices',
                content: 'Modern CSS allows you to create beautiful layouts. Use flexbox and grid for responsive designs.'
            },
            {
                id: '5',
                title: 'Web APIs Explained',
                content: 'Browser APIs like Fetch, LocalStorage, and ServiceWorkers enhance your JavaScript applications significantly.'
            }
        ];

        // Build index
        let idx = lunr(function() {
            this.ref('id');
            this.field('title', { boost: 10 });
            this.field('content');

            documents.forEach(doc => {
                this.add(doc);
            });
        });

        function performSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query.trim()) {
                document.getElementById('results').innerHTML = '';
                return;
            }

            const results = idx.search(query);
            const resultsDiv = document.getElementById('results');

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="no-results">No results found. Try a different search term.</div>';
                return;
            }

            resultsDiv.innerHTML = results.map(result => {
                const doc = documents.find(d => d.id === result.ref);
                const snippet = highlightSnippet(doc.content, query);
                return `
                    <div class="result-item">
                        <div class="result-title">${doc.title}</div>
                        <div class="result-snippet">${snippet}</div>
                        <div class="result-score">Relevance: ${(result.score * 100).toFixed(0)}%</div>
                    </div>
                `;
            }).join('');
        }

        function highlightSnippet(text, query) {
            const regex = new RegExp(`(${query})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // Search on Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
