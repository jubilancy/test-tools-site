<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSZip - ZIP File Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .section {
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }
        .section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .section h2 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Monaco', 'Courier New', monospace;
        }
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #f5576c;
            box-shadow: 0 0 0 3px rgba(245, 87, 108, 0.1);
        }
        textarea {
            height: 80px;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .file-list {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 3px solid #f5576c;
        }
        .file-item:last-child {
            margin-bottom: 0;
        }
        .file-name {
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }
        .file-size {
            color: #999;
            font-size: 12px;
            margin-top: 2px;
        }
        .remove-btn {
            background: #ff5252;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin: 0;
        }
        .remove-btn:hover {
            background: #ff1744;
        }
        .empty {
            color: #999;
            text-align: center;
            padding: 20px;
            font-size: 13px;
        }
        .download-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .status {
            margin-top: 15px;
            padding: 12px;
            background: #e8f5e9;
            border: 1px solid #81c784;
            border-radius: 6px;
            color: #2e7d32;
            font-size: 13px;
            display: none;
        }
        .status.error {
            background: #ffebee;
            border-color: #ef5350;
            color: #c62828;
        }
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 JSZip</h1>
        <p class="subtitle">Create and manage ZIP files entirely in the browser - no server needed</p>
        
        <!-- Add Files Section -->
        <div class="section">
            <h2>➕ Add Files to ZIP</h2>
            
            <div class="input-group">
                <label for="fileName">Filename:</label>
                <input type="text" id="fileName" placeholder="example.txt" />
            </div>
            
            <div class="input-group">
                <label for="fileContent">File Content:</label>
                <textarea id="fileContent" placeholder="Enter file content here..."></textarea>
            </div>
            
            <button onclick="addFile()">➕ Add File</button>
            <button onclick="addSampleFiles()">📄 Add Sample Files</button>
            
            <div class="status" id="status"></div>
        </div>

        <!-- Files List Section -->
        <div class="section">
            <h2>📂 Files in ZIP</h2>
            <div class="file-list" id="fileList">
                <div class="empty">No files added yet</div>
            </div>
        </div>

        <!-- Download Section -->
        <div class="section">
            <h2>💾 Download</h2>
            <div class="download-section">
                <button onclick="downloadZip('archive.zip')">📥 Download ZIP</button>
                <button onclick="clearFiles()" style="background: #999;">🗑️ Clear All</button>
            </div>
        </div>
    </div>

    <script>
        let zipFiles = {};

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.classList.toggle('error', isError);
            status.style.display = 'block';
            setTimeout(() => { status.style.display = 'none'; }, 4000);
        }

        function addFile() {
            const fileName = document.getElementById('fileName').value.trim();
            const fileContent = document.getElementById('fileContent').value;

            if (!fileName) {
                showStatus('Please enter a filename', true);
                return;
            }

            if (!fileContent) {
                showStatus('Please enter file content', true);
                return;
            }

            zipFiles[fileName] = fileContent;
            updateFileList();
            document.getElementById('fileName').value = '';
            document.getElementById('fileContent').value = '';
            showStatus(`✅ Added: ${fileName}`);
        }

        function addSampleFiles() {
            const samples = {
                'README.md': '# My Project\n\nThis is a sample project with multiple files.',
                'index.html': '<!DOCTYPE html>\n<html>\n<head><title>Hello</title></head>\n<body><h1>Hello World</h1></body>\n</html>',
                'style.css': 'body { font-family: Arial, sans-serif; margin: 20px; }',
                'script.js': 'console.log("Hello from JavaScript!");'
            };

            zipFiles = { ...zipFiles, ...samples };
            updateFileList();
            showStatus('✅ Added 4 sample files');
        }

        function removeFile(fileName) {
            delete zipFiles[fileName];
            updateFileList();
            showStatus(`Removed: ${fileName}`);
        }

        function updateFileList() {
            const fileList = document.getElementById('fileList');
            const fileNames = Object.keys(zipFiles);

            if (fileNames.length === 0) {
                fileList.innerHTML = '<div class="empty">No files added yet</div>';
                return;
            }

            fileList.innerHTML = fileNames.map(name => `
                <div class="file-item">
                    <div>
                        <div class="file-name">📄 ${name}</div>
                        <div class="file-size">${zipFiles[name].length} bytes</div>
                    </div>
                    <button class="remove-btn" onclick="removeFile('${name}')">Remove</button>
                </div>
            `).join('');
        }

        async function downloadZip(filename) {
            if (Object.keys(zipFiles).length === 0) {
                showStatus('Add files before downloading', true);
                return;
            }

            try {
                const zip = new JSZip();
                
                Object.keys(zipFiles).forEach(fileName => {
                    zip.file(fileName, zipFiles[fileName]);
                });

                const blob = await zip.generateAsync({ type: 'blob' });
                saveAs(blob, filename);
                showStatus(`✅ Downloaded: ${filename}`);
            } catch (error) {
                showStatus('Error creating ZIP: ' + error.message, true);
            }
        }

        function clearFiles() {
            if (Object.keys(zipFiles).length === 0) {
                showStatus('No files to clear', true);
                return;
            }
            zipFiles = {};
            updateFileList();
            showStatus('🗑️ All files cleared');
        }
    </script>
</body>
</html>
