<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff2Html - Diff Viewer</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/diff2html/bundles/css/diff2html.min.css">
    <script src="https://cdn.jsdelivr.net/npm/diff2html/bundles/js/diff2html.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #00f2fe;
            box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.1);
        }
        button {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s;
            grid-column: 1 / -1;
            margin-bottom: 20px;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .output-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            overflow-x: auto;
        }
        .view-options {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            grid-column: 1 / -1;
        }
        .view-options button {
            margin-bottom: 0;
            padding: 8px 16px;
            flex: 1;
            font-size: 13px;
        }
        /* Override diff2html styles */
        .d2h-wrapper {
            margin: 0;
        }
        .d2h-file-header {
            background: #f0f0f0;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }
        @media (max-width: 768px) {
            .input-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Diff2Html</h1>
        <p class="subtitle">Visual diff viewer - see code changes side-by-side or line-by-line</p>
        
        <div class="input-section">
            <div class="input-group">
                <label for="originalText">Original Text:</label>
                <textarea id="originalText" placeholder="Paste original text here...">function greet(name) {
  console.log('Hello ' + name);
  return name;
}</textarea>
            </div>
            
            <div class="input-group">
                <label for="modifiedText">Modified Text:</label>
                <textarea id="modifiedText" placeholder="Paste modified text here...">function greet(name) {
  console.log(`Hello ${name}!`);
  return name.toUpperCase();
}</textarea>
            </div>
            
            <div class="view-options">
                <button onclick="generateDiff('side')">Side-by-Side</button>
                <button onclick="generateDiff('line')">Line-by-Line</button>
            </div>
        </div>
        
        <div class="output-section" id="outputSection" style="display: none;">
            <div id="diffOutput"></div>
        </div>
    </div>

    <script>
        function generateDiff(viewType) {
            const original = document.getElementById('originalText').value;
            const modified = document.getElementById('modifiedText').value;

            if (!original.trim() || !modified.trim()) {
                alert('Please enter both original and modified text');
                return;
            }

            // Create unified diff format
            const originalLines = original.split('\n');
            const modifiedLines = modified.split('\n');

            let diffString = '--- original\n+++ modified\n';
            diffString += `@@ -1,${originalLines.length} +1,${modifiedLines.length} @@\n`;

            originalLines.forEach(line => {
                diffString += `- ${line}\n`;
            });
            modifiedLines.forEach(line => {
                diffString += `+ ${line}\n`;
            });

            const diffHtml = Diff2Html.html(diffString, {
                drawFileList: false,
                matching: 'words',
                outputFormat: viewType === 'side' ? 'side-by-side' : 'line-by-line',
            });

            const outputSection = document.getElementById('outputSection');
            outputSection.style.display = 'block';
            document.getElementById('diffOutput').innerHTML = diffHtml;
        }

        // Generate initial diff
        generateDiff('side');
    </script>
</body>
</html>
