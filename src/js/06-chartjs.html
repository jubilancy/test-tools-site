<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chart.js - Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2e2e2e 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            max-width: 1000px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .chart-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .chart-btn {
            background: #f0f0f0;
            border: 2px solid #ddd;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
            color: #333;
        }
        .chart-btn:hover, .chart-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 30px;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: 600;
            font-size: 13px;
            color: #333;
        }
        input, select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .info {
            background: #e3f2fd;
            border: 1px solid #90caf9;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            color: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Chart.js</h1>
        <p class="subtitle">Lightweight & responsive charts - visualize your data instantly</p>
        
        <div class="chart-selector">
            <button class="chart-btn active" onclick="switchChart('line')">📈 Line</button>
            <button class="chart-btn" onclick="switchChart('bar')">📊 Bar</button>
            <button class="chart-btn" onclick="switchChart('pie')">🥧 Pie</button>
            <button class="chart-btn" onclick="switchChart('doughnut')">🍩 Doughnut</button>
            <button class="chart-btn" onclick="switchChart('radar')">🎯 Radar</button>
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="dataPoints">Data Points:</label>
                <input type="number" id="dataPoints" min="3" max="12" value="6" onchange="updateChart()" />
            </div>
            <div class="control-group">
                <label for="maxValue">Max Value:</label>
                <input type="number" id="maxValue" min="50" max="500" value="100" onchange="updateChart()" />
            </div>
            <div class="control-group">
                <label for="tension">Line Tension:</label>
                <input type="range" id="tension" min="0" max="1" step="0.1" value="0.4" onchange="updateChart()" />
            </div>
            <div style="display: flex; align-items: flex-end; gap: 8px;">
                <button onclick="randomizeData()" style="flex: 1;">🎲 Randomize Data</button>
            </div>
        </div>

        <div class="info">
            💡 <strong>Tip:</strong> Switch between chart types, adjust data points, and randomize values to explore different visualizations. Perfect for dashboards and reports!
        </div>
    </div>

    <script>
        let chart = null;
        let currentChartType = 'line';

        const colors = {
            primary: 'rgb(102, 126, 234)',
            secondary: 'rgb(118, 75, 162)',
            accent: 'rgb(255, 152, 0)',
            success: 'rgb(76, 175, 80)',
            danger: 'rgb(244, 67, 54)',
        };

        function generateData(count, max) {
            return Array.from({ length: count }, () => 
                Math.floor(Math.random() * max) + 20
            );
        }

        function generateLabels(count) {
            return Array.from({ length: count }, (_, i) => `Item ${i + 1}`);
        }

        function createChart(type) {
            const ctx = document.getElementById('chart').getContext('2d');
            const pointCount = parseInt(document.getElementById('dataPoints').value);
            const maxValue = parseInt(document.getElementById('maxValue').value);
            const tension = parseFloat(document.getElementById('tension').value);

            const data = {
                labels: generateLabels(pointCount),
                datasets: [
                    {
                        label: 'Dataset 1',
                        data: generateData(pointCount, maxValue),
                        borderColor: colors.primary,
                        backgroundColor: type === 'pie' || type === 'doughnut' ? 
                            [colors.primary, colors.secondary, colors.accent, colors.success, colors.danger, '#9c27b0'] :
                            'rgba(102, 126, 234, 0.1)',
                        borderWidth: type === 'pie' || type === 'doughnut' ? 2 : 2,
                        tension: type === 'line' ? tension : undefined,
                        fill: type === 'line',
                    },
                    ...(type === 'line' || type === 'bar' ? [{
                        label: 'Dataset 2',
                        data: generateData(pointCount, maxValue),
                        borderColor: colors.secondary,
                        backgroundColor: 'rgba(118, 75, 162, 0.1)',
                        borderWidth: 2,
                        tension: type === 'line' ? tension : undefined,
                        fill: type === 'line',
                    }] : [])
                ]
            };

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: type,
                data: data,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: type !== 'pie' && type !== 'doughnut',
                            position: 'top',
                        },
                    },
                    scales: type === 'radar' || type === 'pie' || type === 'doughnut' ? {} : {
                        y: {
                            beginAtZero: true,
                            max: maxValue,
                        }
                    }
                }
            });
        }

        function switchChart(type) {
            currentChartType = type;
            document.querySelectorAll('.chart-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            createChart(type);
        }

        function updateChart() {
            createChart(currentChartType);
        }

        function randomizeData() {
            updateChart();
        }

        // Initialize
        createChart('line');
    </script>
</body>
</html>
