<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papa Parse - CSV to JSON</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .output-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        .output-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 14px;
        }
        pre {
            background: #f5f5f5;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            color: #333;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .stat {
            background: #f5f5f5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
        }
        .stat-label {
            color: #666;
            font-size: 12px;
        }
        .stat-value {
            color: #667eea;
            font-weight: 600;
            font-size: 16px;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗂️ Papa Parse</h1>
        <p class="subtitle">CSV to JSON converter - parse and visualize CSV data instantly</p>
        
        <div class="input-group">
            <label for="csvInput">Paste CSV data:</label>
            <textarea id="csvInput" placeholder="Name,Age,City&#10;John,28,NYC&#10;Jane,32,LA&#10;Bob,25,Chicago"></textarea>
        </div>
        
        <button onclick="parseCSV()">Parse CSV</button>
        
        <div class="output-section" id="outputSection" style="display: none;">
            <div class="output-title">JSON Output:</div>
            <pre id="jsonOutput"></pre>
            <div class="stats" id="stats"></div>
        </div>
    </div>

    <script>
        function parseCSV() {
            const csvInput = document.getElementById('csvInput').value;
            if (!csvInput.trim()) {
                alert('Please enter CSV data');
                return;
            }

            const results = Papa.parse(csvInput, {
                header: true,
                skipEmptyLines: true,
                dynamicTyping: false
            });

            const jsonOutput = JSON.stringify(results.data, null, 2);
            document.getElementById('jsonOutput').textContent = jsonOutput;
            
            const outputSection = document.getElementById('outputSection');
            outputSection.style.display = 'block';

            // Show stats
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <div class="stat">
                    <div class="stat-label">Records Parsed</div>
                    <div class="stat-value">${results.data.length}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Fields</div>
                    <div class="stat-value">${results.data.length > 0 ? Object.keys(results.data[0]).length : 0}</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Parse Errors</div>
                    <div class="stat-value">${results.errors.length}</div>
                </div>
            `;
        }

        // Allow Enter key to parse
        document.getElementById('csvInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') parseCSV();
        });
    </script>
</body>
</html>
